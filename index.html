<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1a1208" />
<title>Signature Decants CUU</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

<!-- Firebase compat SDK (sin ES modules, compatible con GitHub Pages) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Serif Display', Georgia, serif; background: #faf7f4; color: #1a1208; min-height: 100vh; }
  .sans { font-family: 'DM Sans', sans-serif; }

  header { background: #1a1208; color: #f5e6c8; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
  .header-title { font-size: 20px; letter-spacing: .5px; }
  .header-sub { font-family: 'DM Sans', sans-serif; font-size: 11px; opacity: .55; margin-top: 2px; }
  .header-stat { text-align: right; }
  .header-stat-label { font-family: 'DM Sans', sans-serif; font-size: 10px; opacity: .5; }
  .header-stat-value { font-size: 18px; }

  nav { background: #2d1f0e; display: flex; overflow-x: auto; }
  nav button { flex: 1; min-width: 80px; padding: 12px 6px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; background: transparent; color: #c4a97d; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; }
  nav button.active { background: #f5e6c8; color: #1a1208; border-bottom: 3px solid #c9843a; }

  main { padding: 16px; max-width: 680px; margin: 0 auto; padding-bottom: 40px; }

  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 8px rgba(26,18,8,.07); }
  .btn { background: #1a1208; color: #f5e6c8; border: none; border-radius: 8px; padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn:active { opacity: .8; }
  .btn.sec { background: transparent; color: #7a6a55; border: 1px solid #c4a97d; }
  .btn-sm { background: #f5f0ea; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 14px; }
  .btn-sm.danger { background: #fdf0ef; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: #7a6a55; margin-bottom: 4px; }
  .field input, .field select { width: 100%; border: 1px solid #ddd4c4; border-radius: 7px; padding: 9px 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: #faf7f4; color: #1a1208; -webkit-appearance: none; appearance: none; }
  .field input:focus, .field select:focus { outline: none; border-color: #c9843a; }

  .stitle { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #c9843a; margin-bottom: 10px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 8px rgba(26,18,8,.07); }
  .stat-card .slabel { font-family: 'DM Sans', sans-serif; font-size: 10px; color: #9a8a75; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .stat-card .svalue { font-size: 16px; }
  .stat-card.big .svalue { font-size: 20px; font-weight: 700; }

  .empty { text-align: center; font-family: 'DM Sans', sans-serif; color: #b0a090; padding: 32px 16px; font-size: 14px; }
  .spinner { display: flex; justify-content: center; align-items: center; padding: 60px; }
  .spinner::after { content: ''; width: 28px; height: 28px; border: 3px solid #ddd4c4; border-top-color: #c9843a; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1208; color: #f5e6c8; padding: 10px 20px; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: transform .3s; z-index: 300; white-space: nowrap; pointer-events: none; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
  .modal-bg.hidden { display: none; }
  .modal { background: #faf7f4; border-radius: 16px 16px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 88vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-title { font-size: 17px; }
  .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #7a6a55; line-height: 1; padding: 0 4px; }

  .item { padding: 12px 14px; margin-bottom: 8px; }
  .item-title { font-weight: 500; font-size: 15px; }
  .item-sub { font-family: 'DM Sans', sans-serif; font-size: 12px; color: #7a6a55; margin-top: 2px; }
  .item-note { font-family: 'DM Sans', sans-serif; font-size: 12px; font-style: italic; color: #a09080; }
  .row-flex { display: flex; justify-content: space-between; align-items: center; }
  .marca-tag { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #c9843a; margin: 12px 0 8px; }
  .stock-badge { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 20px; }
  .sok { color: #27ae60; } .swarn { color: #e67e22; } .slow { color: #c0392b; }
  .error-banner { background: #fdf0ef; border: 1px solid #e57373; border-radius: 10px; padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #c0392b; margin-bottom: 16px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">🌸 Signature Decants CUU</div>
    <div class="header-sub">Gestión de negocio · MXN</div>
  </div>
  <div class="header-stat">
    <div class="header-stat-label">Ganancia total</div>
    <div class="header-stat-value" id="hdr-ganancia" style="color:#b8e09a">$0.00</div>
  </div>
</header>

<nav>
  <button class="active" onclick="setTab(0)">📦 Stock</button>
  <button onclick="setTab(1)">🛒 Compras</button>
  <button onclick="setTab(2)">💸 Ventas</button>
  <button onclick="setTab(3)">📊 Finanzas</button>
</nav>

<main id="app"><div class="spinner"></div></main>
<div id="toast"></div>

<!-- ── MODAL: Producto ── -->
<div id="modal-producto" class="modal-bg hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="mp-title">Nuevo producto</span>
      <button class="modal-close" onclick="closeModal('producto')">✕</button>
    </div>
    <input type="hidden" id="mp-id" />
    <div class="field"><label>Marca *</label><input id="mp-marca" placeholder="Chanel, Dior, YSL…" autocomplete="off" /></div>
    <div class="field"><label>Nombre *</label><input id="mp-nombre" placeholder="No. 5 Mini" autocomplete="off" /></div>
    <div class="field"><label>Mililitros (ml)</label><input id="mp-ml" type="number" placeholder="5" /></div>
    <div class="field"><label>Stock inicial</label><input id="mp-stock" type="number" placeholder="10" /></div>
    <div class="field"><label>Costo unitario (MXN) *</label><input id="mp-costo" type="number" placeholder="85" /></div>
    <div class="field"><label>Precio de venta (MXN) *</label><input id="mp-precio" type="number" placeholder="150" /></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn" onclick="saveProducto()">Guardar</button>
      <button class="btn sec" onclick="closeModal('producto')">Cancelar</button>
    </div>
  </div>
</div>

<!-- ── MODAL: Compra ── -->
<div id="modal-compra" class="modal-bg hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nueva compra</span>
      <button class="modal-close" onclick="closeModal('compra')">✕</button>
    </div>
    <div class="field"><label>Producto *</label>
      <select id="mc-prod"><option value="">-- Selecciona producto --</option></select>
    </div>
    <div class="field"><label>Cantidad *</label><input id="mc-cant" type="number" min="1" placeholder="10" /></div>
    <div class="field"><label>Costo total (MXN)</label><input id="mc-costo" type="number" placeholder="850" /></div>
    <div class="field"><label>Proveedor</label><input id="mc-prov" placeholder="Nombre o tienda" autocomplete="off" /></div>
    <div class="field"><label>Fecha</label><input id="mc-fecha" type="date" /></div>
    <div class="field"><label>Nota</label><input id="mc-nota" placeholder="Opcional" autocomplete="off" /></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn" onclick="saveCompra()">Guardar</button>
      <button class="btn sec" onclick="closeModal('compra')">Cancelar</button>
    </div>
  </div>
</div>

<!-- ── MODAL: Venta ── -->
<div id="modal-venta" class="modal-bg hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nueva venta</span>
      <button class="modal-close" onclick="closeModal('venta')">✕</button>
    </div>
    <div class="field"><label>Producto *</label>
      <select id="mv-prod" onchange="onProdVentaChange()"><option value="">-- Selecciona producto --</option></select>
    </div>
    <div class="field"><label>Cantidad</label><input id="mv-cant" type="number" min="1" value="1" /></div>
    <div class="field"><label>Precio unitario (MXN)</label><input id="mv-precio" type="number" placeholder="150" /></div>
    <div class="field"><label>Canal de venta</label>
      <select id="mv-canal">
        <option>Efectivo</option><option>Transferencia</option>
        <option>Bizum</option><option>Instagram</option><option>Otra</option>
      </select>
    </div>
    <div class="field"><label>Cliente</label><input id="mv-cliente" placeholder="Opcional" autocomplete="off" /></div>
    <div class="field"><label>Fecha</label><input id="mv-fecha" type="date" /></div>
    <div class="field"><label>Nota</label><input id="mv-nota" placeholder="Opcional" autocomplete="off" /></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn" onclick="saveVenta()">Guardar</button>
      <button class="btn sec" onclick="closeModal('venta')">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ── Firebase init ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAqKZxaBBt2x5N0ssI_IBtDFA-MqTvrfC8",
  authDomain: "signaturedecantscuu.firebaseapp.com",
  projectId: "signaturedecantscuu",
  storageBucket: "signaturedecantscuu.firebasestorage.app",
  messagingSenderId: "1096751110969",
  appId: "1:1096751110969:web:d77674190ec87fa88fa6e8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── State ──────────────────────────────────────────────
var state = { productos: [], compras: [], ventas: [] };
var currentTab = 0;
var loadedCollections = 0; // esperamos 3 antes de mostrar contenido

// ── Helpers ────────────────────────────────────────────
function fmt(n) {
  return new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN" }).format(n || 0);
}
function today() { return new Date().toISOString().split("T")[0]; }
function esc(s) { return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function toast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2500);
}

function markLoaded() {
  loadedCollections++;
  if (loadedCollections >= 3) render();
}

// ── Firestore Listeners ────────────────────────────────
db.collection("productos").orderBy("marca").onSnapshot(function(snap) {
  state.productos = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
  updateHeader();
  populateSelects();
  markLoaded();
  if (loadedCollections >= 3) render();
}, function(err) {
  console.error("Error productos:", err);
  document.getElementById("app").innerHTML =
    '<div class="error-banner">⚠️ Error de conexión con Firebase: ' + err.message +
    '<br><br>Verifica en Firebase Console → Firestore → Rules que diga <code>allow read, write: if true;</code></div>';
});

db.collection("compras").orderBy("ts","desc").onSnapshot(function(snap) {
  state.compras = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
  markLoaded();
  if (loadedCollections >= 3) render();
  updateHeader();
}, function(err) { console.error("Error compras:", err); markLoaded(); });

db.collection("ventas").orderBy("ts","desc").onSnapshot(function(snap) {
  state.ventas = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
  markLoaded();
  if (loadedCollections >= 3) render();
  updateHeader();
}, function(err) { console.error("Error ventas:", err); markLoaded(); });

// ── Header ─────────────────────────────────────────────
function updateHeader() {
  var ganancia = state.ventas.reduce(function(s,v){ return s + ((v.total||0)-(v.costoTotal||0)); }, 0);
  var el = document.getElementById("hdr-ganancia");
  if (el) { el.textContent = fmt(ganancia); el.style.color = ganancia >= 0 ? "#b8e09a" : "#e09a9a"; }
}

// ── Selects ────────────────────────────────────────────
function populateSelects() {
  var opts = '<option value="">-- Selecciona producto --</option>' +
    state.productos.map(function(p) {
      return '<option value="' + p.id + '">' + esc(p.marca) + ' · ' + esc(p.nombre) + ' (stock: ' + p.stock + ')</option>';
    }).join("");
  var mc = document.getElementById("mc-prod");
  var mv = document.getElementById("mv-prod");
  if (mc) mc.innerHTML = opts;
  if (mv) mv.innerHTML = opts;
}

// ── Tabs ───────────────────────────────────────────────
function setTab(i) {
  currentTab = i;
  document.querySelectorAll("nav button").forEach(function(b, idx) {
    b.classList.toggle("active", idx === i);
  });
  render();
}

function render() {
  var el = document.getElementById("app");
  if (currentTab === 0) el.innerHTML = renderStock();
  else if (currentTab === 1) el.innerHTML = renderCompras();
  else if (currentTab === 2) el.innerHTML = renderVentas();
  else el.innerHTML = renderFinanzas();
  populateSelects();
}

// ── STOCK ──────────────────────────────────────────────
function renderStock() {
  var marcas = [];
  state.productos.forEach(function(p) { if (marcas.indexOf(p.marca) < 0) marcas.push(p.marca); });
  marcas.sort();
  var h = '<div class="row-flex" style="margin-bottom:16px">' +
    '<h2 style="font-size:20px">Inventario</h2>' +
    '<button class="btn" onclick="openModal(\'producto\',\'nuevo\')">+ Añadir</button></div>';
  if (!state.productos.length)
    return h + '<div class="empty">Sin productos. Toca "+ Añadir" para empezar.</div>';
  marcas.forEach(function(marca) {
    h += '<div class="marca-tag">' + esc(marca) + '</div>';
    state.productos.filter(function(p){ return p.marca === marca; }).forEach(function(p) {
      var sc = p.stock <= 2 ? "slow" : p.stock <= 5 ? "swarn" : "sok";
      h += '<div class="card item row-flex" style="margin-bottom:8px">' +
        '<div style="flex:1;min-width:0">' +
          '<div class="item-title">' + esc(p.nombre) + ' <span style="font-size:12px;color:#9a8a75">' + (p.ml ? p.ml+"ml" : "") + '</span></div>' +
          '<div class="item-sub">Costo: ' + fmt(p.costo) + ' · Venta: ' + fmt(p.precio) + ' · Margen: ' + fmt(p.precio - p.costo) + '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:10px">' +
          '<span class="stock-badge ' + sc + '">' + p.stock + '</span>' +
          '<button class="btn-sm" onclick="openModal(\'producto\',\'' + p.id + '\')">✏️</button>' +
          '<button class="btn-sm danger" onclick="delProducto(\'' + p.id + '\')">🗑️</button>' +
        '</div></div>';
    });
  });
  return h;
}

// ── COMPRAS ────────────────────────────────────────────
function renderCompras() {
  var h = '<div class="row-flex" style="margin-bottom:16px">' +
    '<h2 style="font-size:20px">Compras</h2>' +
    '<button class="btn" onclick="openModal(\'compra\')">+ Registrar</button></div>';
  if (!state.compras.length) return h + '<div class="empty">Sin compras registradas aún.</div>';
  state.compras.forEach(function(c) {
    h += '<div class="card item row-flex" style="margin-bottom:8px">' +
      '<div>' +
        '<div class="item-title">' + esc(c.marca) + ' · ' + esc(c.producto) + '</div>' +
        '<div class="item-sub">' + esc(c.proveedor || "Sin proveedor") + ' · ' + esc(c.fecha) + '</div>' +
        (c.nota ? '<div class="item-note">' + esc(c.nota) + '</div>' : '') +
      '</div>' +
      '<div style="text-align:right;flex-shrink:0;margin-left:10px">' +
        '<div class="sans" style="font-weight:700">' + fmt(c.total) + '</div>' +
        '<div class="sans" style="font-size:12px;color:#7a6a55">×' + c.cantidad + ' uds.</div>' +
      '</div></div>';
  });
  return h;
}

// ── VENTAS ─────────────────────────────────────────────
function renderVentas() {
  var h = '<div class="row-flex" style="margin-bottom:16px">' +
    '<h2 style="font-size:20px">Ventas</h2>' +
    '<button class="btn" onclick="openModal(\'venta\')">+ Registrar</button></div>';
  if (!state.ventas.length) return h + '<div class="empty">Sin ventas registradas aún.</div>';
  state.ventas.forEach(function(v) {
    var gan = (v.total||0) - (v.costoTotal||0);
    h += '<div class="card item row-flex" style="margin-bottom:8px">' +
      '<div>' +
        '<div class="item-title">' + esc(v.marca) + ' · ' + esc(v.producto) + '</div>' +
        '<div class="item-sub">' + esc(v.canal) + (v.cliente ? " · "+esc(v.cliente) : "") + ' · ' + esc(v.fecha) + '</div>' +
        (v.nota ? '<div class="item-note">' + esc(v.nota) + '</div>' : '') +
      '</div>' +
      '<div style="text-align:right;flex-shrink:0;margin-left:10px">' +
        '<div class="sans" style="font-weight:700;color:#27ae60">' + fmt(v.total) + '</div>' +
        '<div class="sans" style="font-size:12px;color:#7a6a55">×' + v.cantidad + ' · gan: ' + fmt(gan) + '</div>' +
      '</div></div>';
  });
  return h;
}

// ── FINANZAS ───────────────────────────────────────────
function renderFinanzas() {
  var totalVentas = state.ventas.reduce(function(s,v){ return s+(v.total||0); }, 0);
  var costoVentas = state.ventas.reduce(function(s,v){ return s+(v.costoTotal||0); }, 0);
  var ganancia = totalVentas - costoVentas;
  var totalCompras = state.compras.reduce(function(s,c){ return s+(c.total||0); }, 0);
  var invStock = state.productos.reduce(function(s,p){ return s+p.stock*p.costo; }, 0);
  var valStock = state.productos.reduce(function(s,p){ return s+p.stock*p.precio; }, 0);

  var porCanal = {};
  state.ventas.forEach(function(v){ porCanal[v.canal] = (porCanal[v.canal]||0) + v.total; });
  var porMarca = {};
  state.ventas.forEach(function(v){
    if (!porMarca[v.marca]) porMarca[v.marca] = { ventas:0, ganancia:0 };
    porMarca[v.marca].ventas += v.total;
    porMarca[v.marca].ganancia += (v.total - v.costoTotal);
  });

  var h = '<h2 style="font-size:20px;margin-bottom:16px">Resumen financiero</h2>' +
    '<div class="stat-grid">' +
    '<div class="stat-card"><div class="slabel">Ventas brutas</div><div class="svalue" style="color:#27ae60">' + fmt(totalVentas) + '</div></div>' +
    '<div class="stat-card"><div class="slabel">Costo de ventas</div><div class="svalue" style="color:#e67e22">' + fmt(costoVentas) + '</div></div>' +
    '<div class="stat-card big"><div class="slabel">Ganancia neta</div><div class="svalue" style="color:' + (ganancia>=0?"#27ae60":"#c0392b") + '">' + fmt(ganancia) + '</div></div>' +
    '<div class="stat-card"><div class="slabel">Total compras</div><div class="svalue" style="color:#e67e22">' + fmt(totalCompras) + '</div></div>' +
    '<div class="stat-card"><div class="slabel">Inversión en stock</div><div class="svalue" style="color:#3498db">' + fmt(invStock) + '</div></div>' +
    '<div class="stat-card"><div class="slabel">Valor stock (venta)</div><div class="svalue" style="color:#9b59b6">' + fmt(valStock) + '</div></div>' +
    '</div>';

  var canales = Object.entries(porCanal).sort(function(a,b){ return b[1]-a[1]; });
  if (canales.length) {
    h += '<div class="card" style="padding:16px;margin-bottom:16px"><div class="stitle">Ventas por canal</div>';
    canales.forEach(function(e) {
      h += '<div class="row-flex sans" style="font-size:14px;padding:6px 0;border-bottom:1px solid #efe8dc"><span>' + esc(e[0]) + '</span><span style="font-weight:600">' + fmt(e[1]) + '</span></div>';
    });
    h += '</div>';
  }
  var marcas = Object.entries(porMarca).sort(function(a,b){ return b[1].ganancia-a[1].ganancia; });
  if (marcas.length) {
    h += '<div class="card" style="padding:16px"><div class="stitle">Por marca</div>';
    marcas.forEach(function(e) {
      h += '<div class="row-flex sans" style="font-size:13px;padding:6px 0;border-bottom:1px solid #efe8dc">' +
        '<span style="font-weight:500">' + esc(e[0]) + '</span>' +
        '<span>Vtas: ' + fmt(e[1].ventas) + ' · <span style="color:#27ae60;font-weight:600">Gan: ' + fmt(e[1].ganancia) + '</span></span>' +
        '</div>';
    });
    h += '</div>';
  }
  if (!state.ventas.length) h += '<div class="empty">Registra ventas para ver estadísticas.</div>';
  return h;
}

// ── Modales ────────────────────────────────────────────
function openModal(name, extra) {
  if (name === "producto") {
    if (extra && extra !== "nuevo") {
      var p = null;
      state.productos.forEach(function(x){ if (x.id === extra) p = x; });
      if (!p) return;
      document.getElementById("mp-title").textContent = "Editar producto";
      document.getElementById("mp-id").value = p.id;
      document.getElementById("mp-marca").value = p.marca || "";
      document.getElementById("mp-nombre").value = p.nombre || "";
      document.getElementById("mp-ml").value = p.ml || "";
      document.getElementById("mp-stock").value = p.stock || 0;
      document.getElementById("mp-costo").value = p.costo || "";
      document.getElementById("mp-precio").value = p.precio || "";
    } else {
      document.getElementById("mp-title").textContent = "Nuevo producto";
      document.getElementById("mp-id").value = "";
      ["mp-marca","mp-nombre","mp-ml","mp-stock","mp-costo","mp-precio"].forEach(function(id) {
        var el = document.getElementById(id); if (el) el.value = "";
      });
    }
  }
  if (name === "compra") {
    document.getElementById("mc-cant").value = "";
    document.getElementById("mc-costo").value = "";
    document.getElementById("mc-prov").value = "";
    document.getElementById("mc-nota").value = "";
    document.getElementById("mc-fecha").value = today();
  }
  if (name === "venta") {
    document.getElementById("mv-cant").value = "1";
    document.getElementById("mv-precio").value = "";
    document.getElementById("mv-cliente").value = "";
    document.getElementById("mv-nota").value = "";
    document.getElementById("mv-fecha").value = today();
  }
  populateSelects();
  document.getElementById("modal-" + name).classList.remove("hidden");
}

function closeModal(name) {
  document.getElementById("modal-" + name).classList.add("hidden");
}

// Cerrar al tocar fondo
document.querySelectorAll(".modal-bg").forEach(function(el) {
  el.addEventListener("click", function(e) {
    if (e.target === this) this.classList.add("hidden");
  });
});

// ── CRUD Producto ──────────────────────────────────────
function saveProducto() {
  var marca = document.getElementById("mp-marca").value.trim();
  var nombre = document.getElementById("mp-nombre").value.trim();
  var costo = parseFloat(document.getElementById("mp-costo").value) || 0;
  var precio = parseFloat(document.getElementById("mp-precio").value) || 0;
  if (!marca || !nombre) { toast("⚠️ Marca y nombre son obligatorios"); return; }
  if (!precio) { toast("⚠️ Ingresa el precio de venta"); return; }
  var data = {
    marca: marca, nombre: nombre,
    ml: parseFloat(document.getElementById("mp-ml").value) || 0,
    stock: parseInt(document.getElementById("mp-stock").value) || 0,
    costo: costo, precio: precio
  };
  var id = document.getElementById("mp-id").value;
  var promise = id
    ? db.collection("productos").doc(id).update(data)
    : db.collection("productos").add(Object.assign(data, { ts: firebase.firestore.FieldValue.serverTimestamp() }));
  promise
    .then(function() { closeModal("producto"); toast(id ? "✅ Producto actualizado" : "✅ Producto añadido"); })
    .catch(function(err) { console.error(err); toast("❌ Error: " + err.message); });
}

function delProducto(id) {
  var p = null;
  state.productos.forEach(function(x){ if (x.id === id) p = x; });
  if (!confirm('¿Eliminar "' + (p ? p.nombre : id) + '"?')) return;
  db.collection("productos").doc(id).delete()
    .then(function(){ toast("🗑️ Producto eliminado"); })
    .catch(function(err){ toast("❌ Error: " + err.message); });
}

// ── CRUD Compra ────────────────────────────────────────
function saveCompra() {
  var prodId = document.getElementById("mc-prod").value;
  var cant = parseInt(document.getElementById("mc-cant").value) || 0;
  if (!prodId) { toast("⚠️ Selecciona un producto"); return; }
  if (!cant) { toast("⚠️ Ingresa la cantidad"); return; }
  var prod = null;
  state.productos.forEach(function(p){ if (p.id === prodId) prod = p; });
  var total = parseFloat(document.getElementById("mc-costo").value) || ((prod ? prod.costo : 0) * cant);
  db.collection("compras").add({
    productoId: prodId,
    producto: prod ? prod.nombre : "",
    marca: prod ? prod.marca : "",
    cantidad: cant, total: total,
    proveedor: document.getElementById("mc-prov").value.trim(),
    fecha: document.getElementById("mc-fecha").value || today(),
    nota: document.getElementById("mc-nota").value.trim(),
    ts: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    return db.collection("productos").doc(prodId).update({ stock: (prod ? prod.stock : 0) + cant });
  }).then(function() {
    closeModal("compra"); toast("✅ Compra registrada");
  }).catch(function(err){ console.error(err); toast("❌ Error: " + err.message); });
}

// ── CRUD Venta ─────────────────────────────────────────
function onProdVentaChange() {
  var prodId = document.getElementById("mv-prod").value;
  var prod = null;
  state.productos.forEach(function(p){ if (p.id === prodId) prod = p; });
  if (prod) document.getElementById("mv-precio").value = prod.precio;
}

function saveVenta() {
  var prodId = document.getElementById("mv-prod").value;
  var cant = parseInt(document.getElementById("mv-cant").value) || 1;
  if (!prodId) { toast("⚠️ Selecciona un producto"); return; }
  var prod = null;
  state.productos.forEach(function(p){ if (p.id === prodId) prod = p; });
  if (!prod) return;
  if (prod.stock < cant) { toast("⚠️ Stock insuficiente (" + prod.stock + " disponibles)"); return; }
  var precio = parseFloat(document.getElementById("mv-precio").value) || prod.precio;
  db.collection("ventas").add({
    productoId: prodId, producto: prod.nombre, marca: prod.marca,
    cantidad: cant, precio: precio, total: precio * cant, costoTotal: prod.costo * cant,
    canal: document.getElementById("mv-canal").value,
    cliente: document.getElementById("mv-cliente").value.trim(),
    fecha: document.getElementById("mv-fecha").value || today(),
    nota: document.getElementById("mv-nota").value.trim(),
    ts: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    return db.collection("productos").doc(prodId).update({ stock: prod.stock - cant });
  }).then(function() {
    closeModal("venta"); toast("✅ Venta registrada");
  }).catch(function(err){ console.error(err); toast("❌ Error: " + err.message); });
}
</script>
